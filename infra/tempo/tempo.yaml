server:
  http_listen_port: 3200

# Configures how Tempo receives traces from your apps
distributor:
  receivers:
    otlp:
      protocols:
        http:     # Your apps can send traces via HTTP (port 4318)
        grpc:     # Your apps can send traces via gRPC (port 4317)

# Simple local filesystem storage block config
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal