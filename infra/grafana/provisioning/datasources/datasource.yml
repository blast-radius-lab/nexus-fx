apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090 
    isDefault: true
    editable: false # Prevents users from accidentally deleting it in the UI
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      # This links Tempo traces back to your Prometheus service metrics
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: 'Prometheus'
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      # This magical setting links your Logs directly to your Traces!
      derivedFields:
        - datasourceUid: 'Tempo'
          matcherRegex: '(?:trace_id|traceid)=(\w+)'
          name: 'TraceID'
          url: '$${__value.raw}'