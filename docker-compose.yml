services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 5

  price-service:
    build: ./services/price-service
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  engine:
    build: ./services/engine
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
      PRICE_SERVICE_URL: http://price-service:8001
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      price-service:
        condition: service_started

  api-gateway:
    build: ./services/api-gateway
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
      PRICE_SERVICE_URL: http://price-service:8001
      ENGINE_URL: http://engine:8002
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      price-service:
        condition: service_started
      engine:
        condition: service_started

volumes:
  postgres-data: